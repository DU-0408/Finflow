apiVersion: apps/v1
kind: Deployment
metadata:
  name: finflow-prometheus
  namespace: finflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: finflow-prometheus
  template:
    metadata:
      labels:
        app: finflow-prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          ports:
            - containerPort: 9090
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
            - name: prometheus-data
              mountPath: /prometheus
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "200m"
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: prometheus-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: finflow-prometheus
  namespace: finflow
spec:
  type: NodePort
  selector:
    app: finflow-prometheus
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30909
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: finflow-grafana
  namespace: finflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: finflow-grafana
  template:
    metadata:
      labels:
        app: finflow-grafana
    spec:
      securityContext:
        fsGroup: 472
        runAsUser: 472
      containers:
        - name: grafana
          image: grafana/grafana:10.4.3
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
            - name: grafana-provisioning-new
              mountPath: /etc/grafana/provisioning/datasources/prometheus.yml
              subPath: prometheus.yml
            - name: grafana-provisioning-new
              mountPath: /etc/grafana/provisioning/dashboards/dashboard.yml
              subPath: dashboard.yml
            - name: grafana-provisioning-new
              mountPath: /etc/grafana/provisioning/dashboards/finflow.json
              subPath: finflow.json
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: grafana-data
          persistentVolumeClaim:
            claimName: finflow-grafana-data
        - name: grafana-provisioning-new
          configMap:
            name: grafana-provisioning-new
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: finflow-grafana-data
  namespace: finflow
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: finflow-grafana
  namespace: finflow
spec:
  type: NodePort
  selector:
    app: finflow-grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300