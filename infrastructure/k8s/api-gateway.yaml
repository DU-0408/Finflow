apiVersion: apps/v1
kind: Deployment
metadata:
  name: finflow-api-gateway
  namespace: finflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: finflow-api-gateway
  template:
    metadata:
      labels:
        app: finflow-api-gateway
    spec:
      containers:
        - name: api-gateway
          image: du0408/finflow-api-gateway:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: finflow-config
            - secretRef:
                name: finflow-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: finflow-api-gateway
  namespace: finflow
spec:
  type: NodePort
  selector:
    app: finflow-api-gateway
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30800