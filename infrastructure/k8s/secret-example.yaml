# Copy this file to secret.yaml and fill in your values
# secret.yaml is gitignored and should NEVER be committed

apiVersion: v1
kind: Secret
metadata:
  name: finflow-secrets
  namespace: finflow
type: Opaque
stringData:
  POSTGRES_PASSWORD: your_postgres_password
  AWS_ACCESS_KEY_ID: your_aws_access_key
  AWS_SECRET_ACCESS_KEY: your_aws_secret_key
  SNS_ALERT_TOPIC_ARN: arn:aws:sns:ap-south-1:YOUR_ACCOUNT_ID:finflow-alerts