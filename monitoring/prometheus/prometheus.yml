global:
  scrape_interval: 15s

scrape_configs:

  - job_name: "api_gateway"
    static_configs:
      - targets: ["finflow-api-gateway:8000"]

  - job_name: "fraud_service"
    static_configs:
      - targets: ["finflow-fraud-service:8001"]

  - job_name: "notification_service"
    static_configs:
      - targets: ["finflow-notification-service:8002"]

  - job_name: "generator"
    static_configs:
      - targets: ["finflow-generator-metrics:8003"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]